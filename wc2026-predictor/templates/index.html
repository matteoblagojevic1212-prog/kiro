<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Predictor</title>
  <link rel="preconnect" href="https://flagcdn.com" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/static/logo.png" alt="World Cup 2026"
           onerror="this.onerror=null;this.src='/static/logo.svg'" />
      <div class="brand-text">
        <h1>World Cup 2026</h1>
        <p class="sub">Predictor &amp; live tracker</p>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="matches">Matches</button>
    <button class="tab" data-tab="groups">Groups</button>
    <div class="filter-wrap" id="filter-wrap">
      <button class="chip active" data-filter="upcoming">Upcoming</button>
      <button class="chip" data-filter="live">Live</button>
      <button class="chip" data-filter="finished">Finished</button>
    </div>
  </nav>

  <main>
    <section id="view-matches" class="view active">
      <div id="matches" class="matches-grid">
        <div class="loading">Loading matches…</div>
      </div>
    </section>

    <section id="view-groups" class="view">
      <div id="groups" class="groups-grid">
        <div class="loading">Loading groups…</div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <div id="modal-body"><div class="loading">Analyzing…</div></div>
    </div>
  </div>

  <footer class="footer">
    <p>World Cup 2026 Predictor</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
